<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockTake Pro API</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; color: white; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); text-align: center; }
        h1 { margin-top: 0; color: #38bdf8; }
        code { background: #334155; padding: 0.2rem 0.5rem; border-radius: 0.25rem; }
        .status { margin-top: 1rem; font-size: 0.875rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>StockTake Pro API</h1>
        <p>Your API is successfully deployed to Vercel!</p>
        <p>Try the endpoints:</p>
        <ul style="text-align: left; list-style: none; padding: 0;">
            <li>✅ <code>/api/items</code></li>
            <li>✅ <code>/api/users</code></li>
            <li>✅ <code>/api/bins</code></li>
        </ul>
        <div class="status">Connected to Supabase</div>
    </div>

</html>
